name: Deploy Ecommerce Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --working-dir=api --prefer-dist --no-interaction

      - name: Run backend tests
        working-directory: api
        run: php artisan test

      - name: Prepare SSH key
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          for attempt in 1 2 3; do
            if ssh-keyscan -T 15 -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            sleep 5
          done
          true

      - name: Sync Laravel application
        run: |
          rsync -az --delete \
            --exclude ".env" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "storage/logs/*" \
            --exclude "storage/framework/cache/data/*" \
            --exclude "storage/framework/sessions/*" \
            --exclude "storage/framework/testing/*" \
            --exclude "storage/framework/views/*" \
            --exclude "bootstrap/cache/*" \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_ed25519" \
            ./api/ "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_APP_PATH }}/"

      - name: Sync public entry files
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/id_ed25519" \
            ./api/deploy/hostinger-public/ "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PUBLIC_PATH }}/"

      - name: Run remote deployment steps
        env:
          RAZORPAY_MERCHANT_ID: ${{ secrets.RAZORPAY_MERCHANT_ID }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "${{ secrets.HOSTINGER_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}" \
            RAZORPAY_MERCHANT_ID="${RAZORPAY_MERCHANT_ID}" \
            RAZORPAY_KEY_ID="${RAZORPAY_KEY_ID}" \
            RAZORPAY_KEY_SECRET="${RAZORPAY_KEY_SECRET}" \
            RAZORPAY_WEBHOOK_SECRET="${RAZORPAY_WEBHOOK_SECRET}" \
            'bash -se' <<EOF
          set -e
          APP_PATH="${{ secrets.HOSTINGER_APP_PATH }}"
          PUBLIC_PATH="${{ secrets.HOSTINGER_PUBLIC_PATH }}"

          mkdir -p "\$APP_PATH/storage/framework/cache/data" \
            "\$APP_PATH/storage/framework/sessions" \
            "\$APP_PATH/storage/framework/views" \
            "\$APP_PATH/storage/logs" \
            "\$APP_PATH/bootstrap/cache"

          rm -f "\$PUBLIC_PATH/default.php"
          ln -sfn "\$APP_PATH/storage/app/public" "\$PUBLIC_PATH/storage"

          cd "\$APP_PATH"
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
          php artisan migrate --seed --force
          if [ -f "\$APP_PATH/database/data/amazon-products.json" ]; then
            php artisan catalog:import-amazon-sheet "\$APP_PATH/database/data/amazon-products.json" --refresh
          fi
          php artisan tinker --execute='
            \$cod = App\Models\PaymentGatewaySetting::query()->firstOrNew(["provider" => "cod"]);
            \$cod->fill([
              "display_name" => \$cod->display_name ?: "Cash on Delivery",
              "sort_order" => \$cod->sort_order ?: 4,
              "is_active" => true,
              "is_test_mode" => false,
            ])->save();

            if (filled(env("RAZORPAY_KEY_ID")) && filled(env("RAZORPAY_KEY_SECRET")) && filled(env("RAZORPAY_WEBHOOK_SECRET"))) {
              App\Models\PaymentGatewaySetting::query()->updateOrCreate(
                ["provider" => "razorpay"],
                [
                  "display_name" => "Razorpay",
                  "merchant_id" => env("RAZORPAY_MERCHANT_ID"),
                  "public_key" => env("RAZORPAY_KEY_ID"),
                  "secret_key" => env("RAZORPAY_KEY_SECRET"),
                  "webhook_secret" => env("RAZORPAY_WEBHOOK_SECRET"),
                  "sort_order" => 1,
                  "is_active" => true,
                  "is_test_mode" => false,
                ]
              );
            }
          '
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          EOF

      - name: Verify deployed API health
        run: |
          curl --fail --silent --show-error \
            --retry 8 \
            --retry-delay 5 \
            --retry-connrefused \
            "https://ecombeckend.saaszo.in/api/v1/health"
